name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Iris-debug
          path: output/Iris-debug.apk

      - name: Installation Guide
        run: |
          echo "## 설치 방법" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 1. APK 다운로드" >> $GITHUB_STEP_SUMMARY
          echo "위 **Artifacts** 섹션에서 \`Iris-debug\` 를 다운로드하고 압축 해제" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 2. redroid 기기에 설치" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "adb -s zzomist.ddns.net:55555 install -r Iris-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 3. 앱 재시작 (설치 후)" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "adb -s zzomist.ddns.net:55555 shell am force-stop party.qwer.iris" >> $GITHUB_STEP_SUMMARY
          echo "adb -s zzomist.ddns.net:55555 shell am start -n party.qwer.iris/.MainActivity" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
